version: '3.8'

services:
  # Evolution API - REMOVA ESTA SEÇÃO SE USAR EXTERNA
  # Você já tem Evolution em evolution.gestorconecta.com.br
  # Comente ou remova este bloco!

  # Bot Vivi
  vivi:
    build: .
    container_name: vivi-bot
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./logs:/app/logs
    # depends_on removido - usando Evolution externa
    networks:
      - vivi-network

volumes:
  evolution_data:

networks:
  vivi-network:
    driver: bridge