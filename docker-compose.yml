version: '3.8'

services:
  # Bot principal - código que já funciona
  bot:
    build: .
    container_name: atende-camaleao-bot
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - BOT_PORT=3000
      - EVOLUTION_URL=${EVOLUTION_URL}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - EVOLUTION_INSTANCE=${EVOLUTION_INSTANCE}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - BOT_NAME=${BOT_NAME:-Vivi}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY}
      - CAMALEAO_API_KEY=${CAMALEAO_API_KEY}
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - atende-network

  # Redis para cache e sessões
  redis:
    image: redis:7-alpine
    container_name: atende-camaleao-redis
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - atende-network

volumes:
  redis-data:

networks:
  atende-network:
    driver: bridge