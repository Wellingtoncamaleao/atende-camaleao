version: '3.8'

services:
  # Evolution API
  evolution:
    image: evolutionapi/evolution-api:latest
    container_name: evolution-vivi
    restart: always
    ports:
      - "8084:8080"
    environment:
      - NODE_ENV=production
      - SERVER_URL=http://localhost:8084
      - DATABASE_ENABLED=false
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-vivi-key-2024}
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_URL=http://vivi:3000/webhook
      - WEBHOOK_EVENTS_MESSAGE=true
    volumes:
      - evolution_data:/evolution/instances
    networks:
      - vivi-network

  # Bot Vivi
  vivi:
    build: .
    container_name: vivi-bot
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - EVOLUTION_URL=http://evolution:8080
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY:-vivi-key-2024}
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - evolution
    networks:
      - vivi-network

volumes:
  evolution_data:

networks:
  vivi-network:
    driver: bridge